<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Lily · Baxto Style Tattoo</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #000000;
  --void: #030305;
  --deep: #08080f;
  --surface: #0d0d1a;
  --panel: #111120;
  --border: #1a1a35;
  --glow: #6644ff;
  --glow2: #cc44ff;
  --accent: #ff44aa;
  --text: #e0d8ff;
  --muted: #6655aa;
  --success: #44ffaa;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--void); color:var(--text); font-family:"Space Mono",monospace; min-height:100vh; overflow-x:hidden; }
body::before { content:""; position:fixed; top:0; left:0; width:100%; height:100%; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px); z-index:1; pointer-events:none; }
canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity:0.5; }
#app { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; }
header { padding:20px 28px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:rgba(8,8,15,0.85); backdrop-filter:blur(20px); position:sticky; top:0; z-index:10; }
.logo { display:flex; align-items:center; gap:14px; }
.logo-ring { width:38px; height:38px; border:1px solid var(--glow); border-radius:50%; display:flex; align-items:center; justify-content:center; animation:spin 20s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.logo-dot { width:8px; height:8px; background:var(--glow2); border-radius:50%; box-shadow:0 0 10px var(--glow2); }
.logo-text { font-family:"Syncopate",sans-serif; font-size:13px; font-weight:700; letter-spacing:0.25em; }
.logo-sub { font-size:9px; color:var(--muted); letter-spacing:0.4em; margin-top:3px; }
.status { display:flex; align-items:center; gap:7px; font-size:9px; letter-spacing:0.2em; color:var(--success); text-transform:uppercase; }
.status-dot { width:5px; height:5px; background:var(--success); border-radius:50%; box-shadow:0 0 6px var(--success); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#chat { flex:1; overflow-y:auto; padding:28px; display:flex; flex-direction:column; gap:20px; max-width:860px; margin:0 auto; width:100%; }
#chat::-webkit-scrollbar { width:2px; }
#chat::-webkit-scrollbar-thumb { background:var(--glow); }
#welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:55vh; text-align:center; gap:28px; animation:fadeup 1s ease; }
@keyframes fadeup { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.w-icon { width:100px; height:100px; position:relative; }
.w-icon svg { width:100%; height:100%; }
.w-title { font-family:"Syncopate",sans-serif; font-size:clamp(22px,5vw,44px); font-weight:700; letter-spacing:0.2em; background:linear-gradient(135deg,var(--text),var(--glow2),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.w-sub { font-size:10px; letter-spacing:0.4em; color:var(--muted); text-transform:uppercase; }
.hints { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.hint { padding:7px 14px; border:1px solid var(--border); font-size:11px; color:var(--muted); cursor:pointer; transition:all 0.2s; letter-spacing:0.05em; background:rgba(102,68,255,0.03); }
.hint:hover { border-color:var(--glow); color:var(--text); background:rgba(102,68,255,0.08); box-shadow:0 0 16px rgba(102,68,255,0.12); }
.msg { display:flex; gap:14px; animation:fadeup 0.3s ease; }
.msg.user { flex-direction:row-reverse; }
.avatar { width:34px; height:34px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:"Syncopate",sans-serif; font-size:10px; font-weight:700; border:1px solid; }
.msg.user .avatar { border-color:var(--glow); color:var(--glow); background:rgba(102,68,255,0.08); }
.msg.lily .avatar { border-color:var(--glow2); color:var(--glow2); background:rgba(204,68,255,0.08); }
.bubble { max-width:74%; padding:14px 18px; font-size:13px; line-height:1.75; position:relative; }
.msg.user .bubble { background:rgba(102,68,255,0.07); border:1px solid rgba(102,68,255,0.25); border-radius:2px 2px 0 2px; }
.msg.lily .bubble { background:rgba(13,13,26,0.95); border:1px solid var(--border); border-left:2px solid var(--glow2); border-radius:2px 2px 2px 0; }
.meta { font-size:9px; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:7px; display:flex; gap:10px; align-items:center; }
.confidence { color:var(--success); }
.typing { display:flex; gap:4px; align-items:center; padding:2px 0; }
.td { width:4px; height:4px; background:var(--glow2); border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
.td:nth-child(2){animation-delay:0.2s} .td:nth-child(3){animation-delay:0.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }
#input-area { padding:20px 28px; border-top:1px solid var(--border); background:rgba(8,8,15,0.9); backdrop-filter:blur(20px); position:sticky; bottom:0; }
.input-wrap { max-width:860px; margin:0 auto; }
.input-box { display:flex; align-items:flex-end; gap:10px; background:var(--panel); border:1px solid var(--border); padding:11px 14px; transition:border-color 0.2s,box-shadow 0.2s; }
.input-box:focus-within { border-color:var(--glow); box-shadow:0 0 24px rgba(102,68,255,0.08); }
textarea { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:"Space Mono",monospace; font-size:13px; line-height:1.6; resize:none; max-height:110px; min-height:20px; }
textarea::placeholder { color:var(--muted); }
button { width:34px; height:34px; background:var(--glow); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
button:hover { background:var(--glow2); box-shadow:0 0 16px rgba(102,68,255,0.35); transform:scale(1.05); }
button:active { transform:scale(0.95); }
.input-meta { display:flex; justify-content:space-between; margin-top:7px; font-size:9px; color:var(--muted); letter-spacing:0.12em; text-transform:uppercase; }
.tag { display:inline-flex; align-items:center; gap:4px; padding:2px 7px; background:rgba(102,68,255,0.08); border:1px solid rgba(102,68,255,0.18); font-size:9px; letter-spacing:0.12em; color:var(--glow); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-ring"><div class="logo-dot"></div></div>
      <div>
        <div class="logo-text">Black Lily</div>
        <div class="logo-sub">Baxto Style Tattoo · Elite 2026</div>
      </div>
    </div>
    <div class="status"><div class="status-dot"></div>Sistema activo</div>
  </header>
  <div id="chat">
    <div id="welcome">
      <div class="w-icon">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="46" stroke="#6644ff" stroke-width="0.5" stroke-dasharray="5 3" opacity="0.5"/>
          <circle cx="50" cy="50" r="32" stroke="#cc44ff" stroke-width="0.5" opacity="0.35"/>
          <path d="M50 16 L54 46 L50 50 L46 46 Z" fill="#6644ff" opacity="0.9"/>
          <path d="M84 50 L54 54 L50 50 L54 46 Z" fill="#cc44ff" opacity="0.9"/>
          <path d="M50 84 L46 54 L50 50 L54 54 Z" fill="#ff44aa" opacity="0.9"/>
          <path d="M16 50 L46 46 L50 50 L46 54 Z" fill="#6644ff" opacity="0.7"/>
          <circle cx="50" cy="50" r="5" fill="#0d0d1a" stroke="#fff" stroke-width="0.5"/>
          <circle cx="50" cy="50" r="2" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div class="w-title">Black Lily</div>
        <div class="w-sub" style="margin-top:8px">Asistente IA · Baxto Style Tattoo</div>
      </div>
      <div class="hints">
        <div class="hint" onclick="sendHint(this)">¿Dónde están ubicados?</div>
        <div class="hint" onclick="sendHint(this)">¿Cuánto cuesta un tatuaje?</div>
        <div class="hint" onclick="sendHint(this)">Quiero agendar una cita</div>
        <div class="hint" onclick="sendHint(this)">¿Qué estilos hacen?</div>
      </div>
    </div>
  </div>
  <div id="input-area">
    <div class="input-wrap">
      <div class="input-box">
        <textarea id="inp" placeholder="Escribe tu mensaje..." rows="1"></textarea>
        <button onclick="send()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 7L13 1L7 13L6 8L1 7Z" fill="white"/>
          </svg>
        </button>
      </div>
      <div class="input-meta">
        <span>Enter para enviar</span>
        <span class="tag">⬡ Semantic Router · Embeddings IA</span>
      </div>
    </div>
  </div>
</div>
<script>
const API = "https://black-lily-elite.cherry-v1pro.workers.dev/chat";
const chat = document.getElementById("chat");
const inp = document.getElementById("inp");
let busy = false;

// Particles
const cv = document.getElementById("c");
const cx = cv.getContext("2d");
cv.width = innerWidth; cv.height = innerHeight;
const pts = Array.from({length:70},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,s:Math.random()*1.2+.4,c:Math.random()>.5?"#6644ff":"#cc44ff"}));
function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=cv.width; if(p.x>cv.width)p.x=0;
    if(p.y<0)p.y=cv.height; if(p.y>cv.height)p.y=0;
    cx.beginPath(); cx.arc(p.x,p.y,p.s,0,Math.PI*2);
    cx.fillStyle=p.c+"55"; cx.fill();
  });
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<90){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle=`rgba(102,68,255,${.08*(1-d/90)})`;cx.lineWidth=.4;cx.stroke();}
  }
  requestAnimationFrame(draw);
}
draw();
window.addEventListener("resize",()=>{cv.width=innerWidth;cv.height=innerHeight;});

inp.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} });
inp.addEventListener("input",()=>{ inp.style.height="auto"; inp.style.height=Math.min(inp.scrollHeight,110)+"px"; });

function sendHint(el){ inp.value=el.textContent; send(); }

function addMsg(text,type,meta){
  document.getElementById("welcome")?.remove();
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerHTML=`<div class="avatar">${type==="user"?"YO":"BL"}</div><div class="bubble">${meta?`<div class="meta"><span>${meta.modelo}</span><span class="confidence">${(meta.confidence*100).toFixed(0)}% ${meta.intent}</span><span>${meta.latencia_ms}ms</span></div>`:""}${text.replace(/
/g,"<br>").replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")}</div>`;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  document.getElementById("welcome")?.remove();
  const d=document.createElement("div");
  d.className="msg lily"; d.id="typing";
  d.innerHTML=`<div class="avatar">BL</div><div class="bubble"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}

async function send(){
  const text=inp.value.trim();
  if(!text||busy) return;
  busy=true; inp.value=""; inp.style.height="auto";
  addMsg(text,"user");
  addTyping();
  try{
    const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})});
    const data=await r.json();
    document.getElementById("typing")?.remove();
    addMsg(data.respuesta||"Sin respuesta","lily",data);
  }catch(e){
    document.getElementById("typing")?.remove();
    addMsg("Error de conexion.","lily");
  }
  busy=false;
}
</script>
</body>
</html>

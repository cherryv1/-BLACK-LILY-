name: Deploy Lily Dashboard
on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-lily-dashboard.yml'

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Install dependencies
        run: cd dashboard && pnpm install
      
      - name: Run tests
        run: cd dashboard && pnpm test || true
      
      - name: Build dashboard
        run: cd dashboard && pnpm build
      
      - name: Log success
        run: echo "✅ Lily Dashboard built successfully"
